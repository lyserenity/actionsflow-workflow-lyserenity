on:
  poll:
    url: https://app.asana.com/api/1.0/tags/1198197485416173/tasks?completed_since=now&opt_fields=name,due_at,modified_at
    requestConfig:
      method: GET
      headers:
        Authorization: ${{ secrets.ASANA_TOKEN }}
    itemsPath: data
    config:
      format: |
        return {
          gid: item.gid,
          due_at: item.due_at,
          name: item.name,
          uuid: String(item.gid) + item.modified_at
        }
    deduplicationKey: uuid

