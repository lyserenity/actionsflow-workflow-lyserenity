on:
  poll:
    url: https://app.asana.com/api/1.0/tags/1198197485416173/tasks?completed_since=now&opt_fields=name,due_at
    itemsPath: data
    deduplicationKey: gid
    # shouldIncludeRawBody: true
    requestConfig:
      method: GET
      headers:
        Authorization: ${{ secrets.ASANA_TOKEN }}

