on:
  rss:
    url:
      - http://weekly.pychina.org/feeds/all.atom.xml
      - https://github.com/lyserenity/actionsflow-workflow-lyserenity/commits/main.atom
      - http://applefans.today/feed
    config:
      - cron: "0 8 * * *"
jobs:
  request:
    name: Make a HTTP Request
    runs-on: ubuntu-latest
    steps:
      - name: Add a new card to Trello Refile List
        uses: actionsflow/axios@v1
        with:
          url: https://app.asana.com/api/1.0/tasks
          method: POST
          headers: '{ "Content-Type": "application/json", "Authorization": ${{ asana_token }} }'
          data: |
            {
              "idList":"${{ secrets.trello_refile_list_id }}",
              "name": "actionflow | ${{ on.rss.outputs.title }}",
              "html_notes": "<body>${{ on.rss.outputs.content }}\n\n<a href='${{ on.rss.outputs.link }}'>Trello Link</a></body>",
              "projects": ["${{ asana_project }}"],
              "workspace": "${{ asana_workspace }}"
            }
