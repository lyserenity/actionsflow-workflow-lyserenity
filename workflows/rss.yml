jobs:
    asana-task-detail:
        name: 'Make a HTTP Request'
        runs-on: ubuntu-latest
        steps:
            - name: 'To Integromat'
              uses: actionsflow/axios@v1
              id: integromat
              with:
                # The target URL
                # Required: true if custom-config is not set
                url: ${{ INTEGROMAT_WEBHOOK_URL }}
                
                # The request method, basically it's one of GET|POST|PUT|PATCH
                # Default is GET 
                method: 'POST'

                # Content-Type Header value, if data is json string, then content-type default value is application/json
                content-type: application/json
                body: |
                   {
                     "gid": "${{ on.poll.outputs.gid }}", 
                     "name": "${{ on.poll.outputs.gid }}",
                     "due": "${{ on.poll.outputs.due_at }}"
                   }
