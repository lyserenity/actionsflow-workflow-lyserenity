on:
  rss:
    url: http://weekly.pychina.org/feeds/all.atom.xml
    config:
      every: "0 8 * * *"
jobs:
  request:
    name: Make a HTTP Request
    runs-on: ubuntu-latest
    steps:
      - name: Add a new card to Trello Refile List
        uses: actionsflow/axios@v1
        with:
          url: curl https://api.trello.com/1/cards?key=${{secrets.trello_key}}&token=${{secrets.trello_token}}
          method: POST
          body: |
            {
              "idList":"${{ secrets.trello_refile_list_id }}",
              "name": "${{ on.rss.outputs.title }}",
              "desc":"${{ on.rss.outputs.link }}\n<<<${{ on.rss.outputs.content }}>>>"
            }
